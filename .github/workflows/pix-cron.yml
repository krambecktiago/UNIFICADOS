name: PIX cron

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/pix/cron
        run: |
          curl -sS -X POST "${{ secrets.PIX_CRON_URL }}" \
            -H "Authorization: Bearer ${{ secrets.PIX_CRON_SECRET }}" \
            --fail-with-body
